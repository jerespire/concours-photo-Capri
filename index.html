<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PhotoChallenge</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0eb;
      --surface: #ffffff;
      --surface2: #ede8e2;
      --border: rgba(0,0,0,0.08);
      --text: #1a1008;
      --muted: #8a7e74;
      --accent: #C64936;
      --accent2: #AE3521;
      --danger: #922D1C;
      --radius: 16px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── ÉCRAN D'ACCUEIL ── */
    #screen-welcome {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    #screen-welcome::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(198,73,54,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(174,53,33,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .welcome-inner {
      max-width: 480px;
      width: 100%;
      text-align: center;
      animation: fadeUp 0.8s ease both;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 8px 32px rgba(198,73,54,0.25);
    }

    .welcome-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .welcome-sub {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .welcome-sub em {
      color: var(--accent);
      font-style: normal;
    }

    .input-group {
      position: relative;
      margin-bottom: 1rem;
    }

    .input-group input {
      width: 100%;
      padding: 1rem 1.2rem;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(198,73,54,0.12);
    }

    .input-group input::placeholder { color: var(--muted); }

    .btn-primary {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #ffffff;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.02em;
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    /* ── ÉCRAN PRINCIPAL ── */
    #screen-main {
      display: none;
      height: 100vh;
      flex-direction: column;
      position: relative;
    }

    .app-header {
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: rgba(245,240,235,0.92);
      backdrop-filter: blur(10px);
      position: relative;
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .header-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: #ffffff;
      flex-shrink: 0;
    }

    .header-name {
      font-size: 0.9rem;
      font-weight: 500;
    }

    .progress-pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.35rem 0.9rem;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .progress-pill span { color: var(--accent); font-weight: 500; }

    .card-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .challenge-card {
      position: absolute;
      width: min(92vw, 420px);
      max-height: calc(100vh - 80px);
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      user-select: none;
      transition: transform 0.08s ease-out;
      cursor: grab;
    }

    .challenge-card:active { cursor: grabbing; }

    .challenge-card.is-next {
      transform: scale(0.93) translateY(16px);
      opacity: 0.6;
      pointer-events: none;
      z-index: 0;
    }

    .challenge-card.is-active { z-index: 1; }

    .challenge-card.slide-left {
      animation: slideLeft 0.4s cubic-bezier(.55,0,.45,1) forwards;
      z-index: 2;
    }

    .challenge-card.slide-right {
      animation: slideRight 0.4s cubic-bezier(.55,0,.45,1) forwards;
      z-index: 2;
    }

    /* Indicateurs swipe */
    .swipe-indicator {
      position: absolute;
      top: 20px;
      padding: 0.4rem 0.9rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
      z-index: 10;
      border: 2px solid;
    }
    .swipe-indicator.left  { right: 20px; color: #C64936; border-color: #C64936; }
    .swipe-indicator.right { left: 20px;  color: #2e7d32; border-color: #2e7d32; }

    .ref-image-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--surface2);
      overflow: hidden;
    }

    .ref-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .ref-image-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .ref-image-placeholder .ph-icon { font-size: 2.5rem; opacity: 0.4; }

    .card-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(198,73,54,0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 0.3rem 0.65rem;
      font-size: 0.72rem;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .card-body {
      padding: 1.2rem 1.25rem 1.4rem;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .card-desc {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.55;
      margin-bottom: 1.1rem;
    }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
      display: block;
    }

    .upload-zone:hover {
      border-color: var(--accent);
      background: rgba(198,73,54,0.04);
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-zone.has-file {
      border-color: rgba(198,73,54,0.4);
      background: rgba(198,73,54,0.05);
    }

    .upload-label {
      font-size: 0.82rem;
      color: var(--muted);
      pointer-events: none;
    }

    .upload-label strong { color: var(--accent); }

    .preview-thumb {
      width: 100%;
      max-height: 120px;
      object-fit: cover;
      border-radius: 8px;
      display: none;
      pointer-events: none;
    }

    .preview-thumb.visible { display: block; }

    .card-actions {
      display: flex;
      gap: 0.65rem;
      margin-top: 1rem;
    }

    .btn-skip {
      flex: 0 0 auto;
      padding: 0.75rem 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn-skip:hover { background: #ddd8d2; color: var(--text); }

    .btn-back {
      flex: 0 0 auto;
      padding: 0.75rem 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn-back:hover { background: #ddd8d2; color: var(--text); }
    .btn-back:disabled { opacity: 0.25; cursor: not-allowed; }

    .btn-send {
      flex: 1;
      padding: 0.75rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-send:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-send:not(:disabled):hover { opacity: 0.9; transform: translateY(-1px); }



    /* ── ÉCRAN FIN ── */
    #screen-done {
      height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      animation: fadeUp 0.6s ease both;
    }

    .done-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: pop 0.5s 0.2s cubic-bezier(.17,.89,.32,1.28) both;
    }

    .done-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .done-sub {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      max-width: 320px;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1.25rem;
      font-size: 0.85rem;
      color: var(--text);
      z-index: 999;
      transition: transform 0.35s cubic-bezier(.25,.8,.25,1);
      white-space: nowrap;
      pointer-events: none;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: rgba(198,73,54,0.4); color: var(--accent); }
    #toast.error   { border-color: rgba(146,45,28,0.4); color: var(--danger); }

    /* Loader */
    #loader {
      position: fixed;
      inset: 0;
      background: rgba(245,240,235,0.75);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes pop {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes bounce {
      0%, 100% { transform: translateX(0); }
      50%       { transform: translateX(5px); }
    }
    @keyframes slideLeft {
      to { transform: translateX(-130%) rotate(-10deg); opacity: 0; }
    }
    @keyframes slideRight {
      to { transform: translateX(130%) rotate(10deg); opacity: 0; }
    }

    @media (max-height: 680px) {
      .ref-image-wrap { aspect-ratio: 16/9; }
      .card-body { padding: 0.9rem 1rem 1rem; }
    }

    /* ── CADENAS & MODAL ── */
    .lock-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 38px;
      height: 38px;
      background: rgba(198,73,54,0.9);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 2px 12px rgba(198,73,54,0.4);
      z-index: 5;
      transition: transform 0.2s, background 0.2s;
    }
    .lock-btn:hover { transform: scale(1.1); background: rgba(174,53,33,0.95); }

    .lock-overlay {
      position: absolute;
      inset: 0;
      background: rgba(245,240,235,0.92);
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 4;
      border-radius: 24px;
    }

    .lock-overlay .lock-icon { font-size: 3rem; }
    .lock-overlay p { color: var(--muted); font-size: 0.85rem; text-align: center; padding: 0 1rem; }

    #password-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    #password-modal.open { display: flex; }

    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem 1.75rem;
      width: min(90vw, 360px);
      text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.2);
      animation: fadeUp 0.3s ease both;
    }

    .modal-box .modal-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .modal-box h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      margin-bottom: 0.4rem;
    }
    .modal-box p { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.25rem; }

    .modal-input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      text-align: center;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      outline: none;
      margin-bottom: 0.75rem;
      transition: border-color 0.2s;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-input.error { border-color: var(--danger); animation: shake 0.3s ease; }

    .modal-actions { display: flex; gap: 0.5rem; }
    .modal-cancel {
      flex: 1;
      padding: 0.75rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .modal-confirm {
      flex: 1;
      padding: 0.75rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%       { transform: translateX(-6px); }
      75%       { transform: translateX(6px); }
    }
  </style>
</head>
<body>

<!-- ÉCRAN ACCUEIL -->
<div id="screen-welcome">
  <div class="welcome-inner">
    <div class="logo-icon">📷</div>
    <h1 class="welcome-title">Photo Challenge</h1>
    <p class="welcome-sub">
      Imite chaque photo de référence et envoie ta version.<br>
      <em>Que le meilleur photographe gagne !</em>
    </p>
    <div class="input-group">
      <input type="text" id="input-name" placeholder="Ton prénom..." autocomplete="off" maxlength="30"/>
    </div>
    <button class="btn-primary" onclick="startChallenge()">Commencer le défi →</button>
  </div>
</div>

<!-- ÉCRAN PRINCIPAL -->
<div id="screen-main">
  <header class="app-header">
    <div class="header-left">
      <div class="header-avatar" id="avatar-initials">?</div>
      <span class="header-name" id="header-name">—</span>
    </div>
    <div class="progress-pill">
      Photo <span id="prog-current">1</span> / <span id="prog-total">5</span>
    </div>
  </header>
  <div class="card-area" id="card-area">

  </div>
</div>

<!-- ÉCRAN FIN -->
<div id="screen-done" style="display:none; flex-direction:column; align-items:center; justify-content:center; height:100vh; text-align:center; padding:2rem;">
  <div class="done-icon">🏆</div>
  <h2 class="done-title">Bravo <span id="done-name"></span> !</h2>
  <p class="done-sub">Toutes tes photos ont bien été envoyées.<br>Les résultats seront annoncés bientôt !</p>
</div>


<!-- MODAL MOT DE PASSE -->
<div id="password-modal">
  <div class="modal-box">
    <div class="modal-icon">🔒</div>
    <h3>Photo secrète</h3>
    <p>Entre le mot de passe pour débloquer le dernier défi.</p>
    <input type="text" class="modal-input" id="modal-input" placeholder="MOT DE PASSE" maxlength="20"
           onkeydown="if(event.key==='Enter') checkPassword()"/>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Annuler</button>
      <button class="modal-confirm" onclick="checkPassword()">Débloquer 🔓</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="loader"><div class="spinner"></div></div>

<script>
// ══════════════════════════════════════════
//  ⚙️  CONFIGURATION — À MODIFIER
// ══════════════════════════════════════════

// Colle ici l'URL de ton Google Apps Script (étape 2)
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyp9dNxj8F5f0l_Dq9vgWX12C5RyWaNvo_sYUNrDu0UegNM5s_YA-7HA7OBVioJv9RmmA/exec";

// Liste tes images de référence
// → Crée un dossier "images/" dans GitHub et mets tes photos dedans
const CHALLENGES = [
  { id:  1, title: "L'église blanche",          description: "Retrouve cette façade d'église ou de bâtiment religieux blanc et cadre-la de face.",         image: "images/challenge-1.jpg"  },
  { id:  2, title: "La mer à perte de vue",     description: "Capture un panorama mer + montagne avec une végétation en premier plan.",                     image: "images/challenge-2.jpg"  },

  { id:  4, title: "Le port coloré",            description: "Saisis un port animé avec des bateaux et des façades colorées.",                              image: "images/challenge-4.jpg"  },
  { id:  5, title: "La pierre et les escaliers",description: "Trouve un mur en pierre brute avec une plaque ou un panneau, et des marches.",                image: "images/challenge-5.jpg"  },
  { id:  6, title: "La lumière dorée",          description: "Capture un bâtiment ou paysage baigné dans la lumière chaude du coucher de soleil.",          image: "images/challenge-6.jpg"  },
  { id:  7, title: "La forêt de panneaux",      description: "Trouve un carrefour ou poteau avec plusieurs panneaux superposés dans tous les sens.",        image: "images/challenge-7.jpg"  },
  { id:  8, title: "La rue du village",         description: "Photographie une rue typique avec voitures garées et bâtiments colorés.",                     image: "images/challenge-8.jpg"  },
  { id:  9, title: "La chapelle de pierre",     description: "Capture une petite chapelle ou oratoire en pierre avec une croix et une icône.",              image: "images/challenge-9.jpg"  },
  { id: 10, title: "Le point de vue vertigineux",description: "Depuis un belvédère ou sommet, photographie un panorama plongeant sur la mer et les toits.", image: "images/challenge-10.jpg" },
  { id: 11, title: "La roche et la mer",        description: "Cadre une arche ou fenêtre naturelle dans la roche avec la mer bleue en arrière-plan.",       image: "images/challenge-11.jpg" },
  { id: 12, title: "La ligne courbe",           description: "Trouve une route, chemin ou muret qui serpente en courbes avec la mer en fond.",              image: "images/challenge-12.jpg" },
  { id: 13, title: "Le gardien de pierre",      description: "Photographie une sculpture ou statue de dos face à l'horizon marin.",                         image: "images/challenge-13.jpg" },

  { id: 17, title: "Le couvent oublié",         description: "Photographie les toits ou ruines d'un ancien couvent ou monastère avec la mer au loin.",      image: "images/challenge-17.jpg" },
  { id: 18, title: "Le clocher et le ciel",     description: "Cadre une tour de l'horloge ou clocher avec des fils électriques qui traversent le ciel.",   image: "images/challenge-18.jpg" },
  { id: 19, title: "Le kiosque solitaire",      description: "Photographie un petit pavillon ou kiosque en pierre au milieu d'un espace ouvert.",           image: "images/challenge-19.jpg" },
  { id: 20, title: "Le chat de Capri",          description: "Trouve un chat et photographie-le dans la même pose : ramassé sur un muret ou une surface.",  image: "images/challenge-20.jpg" },
  { id: 21, title: "Dopamine",                   description: "Retrouve cette ambiance et recréé la scène.",                                                       image: "images/challenge-21.jpg", locked: true }
];

// ══════════════════════════════════════════
//  ÉTAT
// ══════════════════════════════════════════
let userName   = "";
let currentIdx = 0;
let submissions = {};
let touchStartX = 0;

// ══════════════════════════════════════════
//  DÉMARRAGE
// ══════════════════════════════════════════
function startChallenge() {
  const val = document.getElementById("input-name").value.trim();
  if (!val) { showToast("Saisis ton prénom pour commencer 😊", "error"); return; }

  userName = val;
  document.getElementById("header-name").textContent = userName;
  document.getElementById("avatar-initials").textContent = userName[0].toUpperCase();
  document.getElementById("done-name").textContent = userName;
  document.getElementById("prog-total").textContent = CHALLENGES.length;

  document.getElementById("screen-welcome").style.display = "none";
  const sm = document.getElementById("screen-main");
  sm.style.display = "flex";
  renderCard(currentIdx);
}

document.getElementById("input-name").addEventListener("keydown", e => {
  if (e.key === "Enter") startChallenge();
});

// ══════════════════════════════════════════
//  CARTES
// ══════════════════════════════════════════
function renderCard(idx) {
  document.getElementById("prog-current").textContent = idx + 1;
  const area = document.getElementById("card-area");

  // Nettoyer toutes les cartes non animées
  area.querySelectorAll(".challenge-card:not(.slide-left):not(.slide-right)").forEach(c => c.remove());

  // Carte suivante en arrière-plan
  if (idx + 1 < CHALLENGES.length) {
    const peek = buildCard(CHALLENGES[idx + 1], idx + 1);
    peek.classList.add("is-next");
    area.appendChild(peek);
  }

  // Carte active par-dessus
  const ch   = CHALLENGES[idx];
  const card = buildCard(ch, idx);
  card.classList.add("is-active");
  area.appendChild(card);

  attachSwipe(card);
}

function attachSwipe(card) {
  let startX = 0, startY = 0, currentX = 0, isDragging = false;

  const indLeft  = card.querySelector(".swipe-indicator.left");
  const indRight = card.querySelector(".swipe-indicator.right");

  function onStart(x, y) {
    startX = x; startY = y; currentX = 0; isDragging = true;
    card.style.transition = "none";
  }

  function onMove(x, y) {
    if (!isDragging) return;
    const dx = x - startX;
    const dy = y - startY;
    // Annule si scroll vertical dominant
    if (Math.abs(dy) > Math.abs(dx) + 10) { isDragging = false; return; }
    currentX = dx;
    const rotate = dx * 0.08;
    card.style.transform = `translateX(${dx}px) rotate(${rotate}deg)`;
    if (indLeft)  indLeft.style.opacity  = dx < -30 ? Math.min(1, (-dx - 30) / 60) : 0;
    if (indRight) indRight.style.opacity = dx >  30 ? Math.min(1, (dx - 30) / 60)  : 0;
  }

  function onEnd() {
    if (!isDragging) return;
    isDragging = false;
    card.style.transition = "";
    if (indLeft)  indLeft.style.opacity  = 0;
    if (indRight) indRight.style.opacity = 0;

    if (currentX < -80) {
      skipCard("left");
    } else if (currentX > 80) {
      skipCard("right");
    } else {
      card.style.transform = "";
    }
  }

  // Touch
  card.addEventListener("touchstart", e => onStart(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
  card.addEventListener("touchmove",  e => onMove(e.touches[0].clientX, e.touches[0].clientY),  { passive: true });
  card.addEventListener("touchend",   onEnd, { passive: true });

  // Mouse (desktop)
  card.addEventListener("mousedown",  e => { if (e.target.tagName !== "INPUT" && e.target.tagName !== "BUTTON" && e.target.tagName !== "LABEL") onStart(e.clientX, e.clientY); });
  window.addEventListener("mousemove", e => onMove(e.clientX, e.clientY));
  window.addEventListener("mouseup",   onEnd);
}

function buildCard(ch, idx) {
  const card = document.createElement("div");
  card.className = "challenge-card";
  card.dataset.idx = idx;

  const isLocked = ch.locked && !unlockedIds.includes(ch.id);

  card.innerHTML = `
    <div class="ref-image-wrap">
      <div class="ref-image-placeholder">
        <span class="ph-icon">🖼️</span>
        <span>Image de référence</span>
      </div>
      <img src="${ch.image}" alt="${ch.title}"
           onload="this.previousElementSibling.style.display='none'"
           onerror="this.style.display='none'"
           style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover"/>
      <span class="card-badge">#${String(idx + 1).padStart(2,"0")}</span>
      ${ch.locked ? `<button class="lock-btn" onclick="openModal(${ch.id})" title="Photo secrète">${isLocked ? '🔒' : '🔓'}</button>` : ''}
      ${isLocked ? `<div class="lock-overlay"><div class="lock-icon">🔒</div><p>Cette photo est secrète.<br>Clique sur le cadenas pour la débloquer.</p></div>` : ''}
      <div class="swipe-indicator left">PASSER ✕</div>
      <div class="swipe-indicator right">RETOUR ↺</div>
    </div>
    <div class="card-body">
      <h2 class="card-title">${ch.title}</h2>
      <p class="card-desc">${ch.description}</p>
      <label class="upload-zone" id="zone-${ch.id}">
        <input type="file" accept="image/*" capture="environment"
               onchange="handleFile(event, ${ch.id})"/>
        <img class="preview-thumb" id="thumb-${ch.id}" alt=""/>
        <div class="upload-label" id="lbl-${ch.id}">
          <strong>📁 Choisir ma photo</strong><br>ou prendre avec l'appareil
        </div>
      </label>
      <div class="card-actions">
        <button class="btn-back" id="btn-back-${ch.id}" onclick="goBack()" ${idx === 0 ? 'disabled' : ''}>← Retour</button>
        <button class="btn-skip" onclick="skipCard('left')">Passer →</button>
        <button class="btn-send" id="btn-send-${ch.id}" disabled
                onclick="submitCard(${ch.id})">Envoyer ✓</button>
      </div>
    </div>`;
  return card;
}

// ══════════════════════════════════════════
//  FICHIER
// ══════════════════════════════════════════
function handleFile(event, cid) {
  const file = event.target.files[0];
  if (!file) return;
  submissions[cid] = file;

  const thumb = document.getElementById(`thumb-${cid}`);
  const lbl   = document.getElementById(`lbl-${cid}`);
  const zone  = document.getElementById(`zone-${cid}`);
  const btn   = document.getElementById(`btn-send-${cid}`);

  const reader = new FileReader();
  reader.onload = e => {
    thumb.src = e.target.result;
    thumb.classList.add("visible");
    lbl.style.display = "none";
    zone.classList.add("has-file");
    btn.disabled = false;
  };
  reader.readAsDataURL(file);
}

// ══════════════════════════════════════════
//  ENVOI GOOGLE APPS SCRIPT
// ══════════════════════════════════════════
async function submitCard(cid) {
  const file = submissions[cid];
  if (!file) return;

  if (APPS_SCRIPT_URL === "REMPLACE_PAR_TON_URL_APPS_SCRIPT") {
    showLoader(true);
    await sleep(1200);
    showLoader(false);
    showToast("✅ Photo envoyée ! (mode démo)", "success");
    nextChallenge();
    return;
  }

  showLoader(true);
  try {
    const base64 = await fileToBase64(file);
    const payload = {
      participant : userName,
      challengeId : cid,
      fileName    : `${userName}_challenge${cid}_${Date.now()}.${file.name.split('.').pop()}`,
      fileData    : base64,
      mimeType    : file.type
    };

    // Envoi via no-cors pour contourner les restrictions CORS de GitHub Pages
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(payload)
    });

    // Avec no-cors on ne peut pas lire la réponse, on considère l'envoi réussi
    showToast("✅ Photo envoyée !", "success");
    nextChallenge();
  } catch (err) {
    console.error(err);
    showToast("❌ Erreur d'envoi. Réessaie.", "error");
  } finally {
    showLoader(false);
  }
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(",")[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// ══════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════
function goBack() {
  if (currentIdx === 0) return;
  const area = document.getElementById("card-area");
  area.querySelectorAll(".challenge-card").forEach(c => c.remove());
  currentIdx--;
  renderCard(currentIdx);
}

function skipCard(dir = "left") {
  const area   = document.getElementById("card-area");
  const active = area.querySelector(".challenge-card.is-active");
  if (!active) return;

  active.style.transform = "";
  active.classList.remove("is-active");
  active.classList.add(dir === "left" ? "slide-left" : "slide-right");
  active.addEventListener("animationend", () => active.remove(), { once: true });

  currentIdx++;
  if (currentIdx >= CHALLENGES.length) { showDone(); return; }
  renderCard(currentIdx);
}

function nextChallenge() {
  currentIdx++;
  if (currentIdx >= CHALLENGES.length) setTimeout(showDone, 600);
  else skipCard("left");
}


// ══════════════════════════════════════════
//  SYSTÈME CADENAS
// ══════════════════════════════════════════
const PASSWORD = "GAMBLING";
let unlockedIds = [];
let pendingUnlockId = null;

function openModal(challengeId) {
  pendingUnlockId = challengeId;
  const modal = document.getElementById("password-modal");
  const input = document.getElementById("modal-input");
  input.value = "";
  input.classList.remove("error");
  modal.classList.add("open");
  setTimeout(() => input.focus(), 100);
}

function closeModal() {
  document.getElementById("password-modal").classList.remove("open");
  pendingUnlockId = null;
}

function checkPassword() {
  const input = document.getElementById("modal-input");
  if (input.value.trim().toUpperCase() === PASSWORD) {
    unlockedIds.push(pendingUnlockId);
    closeModal();
    showToast("🔓 Photo débloquée !", "success");
    // Redessiner la carte actuelle
    const area = document.getElementById("card-area");
    area.querySelectorAll(".challenge-card").forEach(c => c.remove());
    renderCard(currentIdx);
  } else {
    input.classList.remove("error");
    void input.offsetWidth;
    input.classList.add("error");
    input.value = "";
    input.placeholder = "Mauvais mot de passe…";
    setTimeout(() => { input.placeholder = "MOT DE PASSE"; }, 2000);
  }
}

// Fermer modal en cliquant dehors
document.getElementById("password-modal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

function showDone() {
  document.getElementById("screen-main").style.display = "none";
  document.getElementById("screen-done").style.display = "flex";
}

// ══════════════════════════════════════════
//  UTILITAIRES
// ══════════════════════════════════════════
let toastTimer;
function showToast(msg, type = "") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className   = type ? `show ${type}` : "show";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ""; }, 3000);
}

function showLoader(on) {
  document.getElementById("loader").style.display = on ? "flex" : "none";
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
